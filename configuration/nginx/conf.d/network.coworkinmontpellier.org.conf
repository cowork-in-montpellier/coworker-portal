server {
    listen 80;
    server_name network.coworkinmontpellier.org;

    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name network.coworkinmontpellier.org;

    ssl_certificate /etc/letsencrypt/live/network.coworkinmontpellier.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/network.coworkinmontpellier.org/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
